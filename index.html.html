<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>✨ Tarot Completo · 78 Arcanos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0f0c;
            background-image: radial-gradient(circle at 20% 30%, #2d1a14 0%, #0d0807 90%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Garamond', 'Georgia', serif;
            padding: 0.5rem;
        }

        .game-container {
            max-width: 700px;
            width: 100%;
            background: rgba(26, 15, 12, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 3rem 3rem 2rem 2rem;
            padding: 1rem 0.8rem 1.2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px #b8936b55 inset;
            border: 1px solid #dabf9a30;
            margin: 0 auto;
        }

        .card-circle {
            position: relative;
            width: 100%;
            max-width: 650px;
            aspect-ratio: 1/1;
            margin: 0 auto 0.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, #2d1a14, #0d0807);
            box-shadow: inset 0 0 60px rgba(0,0,0,0.8);
        }

        /* LOGO CENTRAL - 3 VEZES MAIOR */
        .center-logo {
            position: absolute;
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: #1f130e;
            box-shadow: 0 0 0 3px #b8936b70, 0 0 30px #000000aa;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid #dabf9a;
            pointer-events: none;
            transition: 0.3s;
        }

        .center-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        /* Cartas viradas (verso) */
        .card-slot {
            position: absolute;
            width: clamp(32px, 7vw, 52px);
            height: clamp(46px, 10vw, 76px);
            border-radius: 6px;
            background: #1a0f0c;
            background-image: 
                repeating-linear-gradient(45deg, #2d1a14 0px, #2d1a14 2px, #1a0f0c 2px, #1a0f0c 6px),
                radial-gradient(circle at 30% 30%, #3d2a24, #0d0807);
            box-shadow: 0 3px 8px rgba(0,0,0,0.7), 0 0 0 1px #b68b6a55;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            cursor: default;
            transform-origin: center;
            border: 1px solid #ac8a6b60;
            overflow: hidden;
            will-change: transform, opacity;
        }

        .card-slot::before {
            content: "✦";
            font-size: clamp(0.7rem, 1.5vw, 1.2rem);
            color: #b8936b60;
            text-shadow: 0 0 10px #b8936b30;
            position: absolute;
            z-index: 1;
        }

        .card-slot::after {
            content: "";
            position: absolute;
            width: 70%;
            height: 70%;
            border: 1px solid #b8936b30;
            border-radius: 4px;
        }

        .card-slot.brilho {
            box-shadow: 0 0 25px #f7d9b0, 0 0 50px #e9b68b, 0 0 0 2px #f7e3c9;
            transition: 0.05s;
            transform: scale(1.1);
            border-color: #fadeb0;
            z-index: 10;
        }

        .card-slot.dim {
            opacity: 0.15;
            filter: blur(1px);
            transition: 0.3s;
        }

        /* CARTA REVELADA - FORMATO RETANGULAR PADRÃO - MAIOR EM CELULAR */
        .card-revealed {
            position: absolute;
            width: clamp(180px, 55vw, 320px);
            height: clamp(255px, 77vw, 445px);
            border-radius: 16px 8px 16px 8px;
            background: #281b15;
            background-image: linear-gradient(145deg, #35241d, #1b110e);
            box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 0 2px #c8a888, 0 0 0 5px #b8936b40;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #f2e0cd;
            border: 1px solid #dbbd9e;
            transition: 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 30;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8) rotateY(90deg);
        }

        .card-revealed img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            background: #1a0f0c;
            padding: 4px;
        }

        .card-revealed .text-overlay {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
            height: 100%;
            text-align: center;
            padding-bottom: 10%;
        }

        .card-revealed.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1) rotateY(0deg);
        }

        .card-revealed .numero-grande {
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            font-weight: 200;
            color: #dfc5aa;
            text-shadow: 0 0 20px #b38b6b, 0 0 40px #b38b6b40;
            background: rgba(0,0,0,0.6);
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            border: 1px solid #b8936b40;
        }

        /* NOME DA CARTA - removido de dentro, vai para a legenda */
        .card-revealed .nome {
            display: none;
        }

        /* LEGENDA FORA DA IMAGEM - com nome em destaque CLICÁVEL */
        .legend-container {
            max-width: 650px;
            margin: 0.2rem auto 0.4rem;
            padding: 0 0.3rem;
            text-align: center;
        }

        .legend-under-card {
            font-size: clamp(0.9rem, 2.2vw, 1.2rem);
            color: #cbb09b;
            text-align: center;
            font-style: italic;
            letter-spacing: 0.04rem;
            background: rgba(26, 15, 12, 0.7);
            padding: 0.5rem 0.8rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid #b8936b40;
            min-height: 2.8rem;
            display: inline-block;
            width: 100%;
            transition: opacity 0.4s;
            word-break: break-word;
        }

        .legend-under-card .highlight {
            color: #f0d5b0;
            font-weight: 600;
        }

        .legend-under-card .card-name {
            color: #f7e3c9;
            font-weight: 700;
            font-size: clamp(1.1rem, 2.8vw, 1.6rem);
            text-shadow: 0 0 30px #b8936b60;
            letter-spacing: 0.06rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
            position: relative;
        }

        .legend-under-card .card-name:hover {
            color: #fadeb0;
            text-shadow: 0 0 40px #b8936b, 0 0 80px #b8936b40;
            transform: scale(1.05);
        }

        .legend-under-card .card-name::after {
            content: " 🔍";
            font-size: 0.6em;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .legend-under-card .card-name:hover::after {
            opacity: 1;
        }

        .legend-under-card .card-name .tooltip {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #f0d5b0;
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-size: 0.6rem;
            white-space: nowrap;
            border: 1px solid #b8936b40;
            pointer-events: none;
        }

        .legend-under-card .card-name:hover .tooltip {
            display: block;
        }

        .legend-under-card .meaning {
            color: #d4b8a0;
        }

        /* BARRA DE PERGUNTAS */
        .question-bar {
            background: #1f130ecc;
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 0.4rem 0.8rem 0.4rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.4rem 0.3rem;
            border: 1px solid #b8936b70;
            margin-top: 0.2rem;
            box-shadow: 0 8px 18px #00000055;
        }

        .question-bar input {
            flex: 2 1 150px;
            background: transparent;
            border: none;
            border-bottom: 2px solid #b48b6b;
            padding: 0.5rem 0.2rem;
            font-size: clamp(0.8rem, 2vw, 0.95rem);
            color: #f1dec9;
            outline: none;
            font-family: 'Segoe UI', 'Garamond', serif;
            letter-spacing: 0.04rem;
            min-width: 100px;
            width: 100%;
            transition: border-color 0.3s;
        }

        .question-bar input:focus {
            border-bottom-color: #dab38b;
        }

        .question-bar input::placeholder {
            color: #b69478b0;
            font-style: italic;
            font-weight: 300;
        }

        .question-bar button {
            background: #dab38b;
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: clamp(0.75rem, 2vw, 1rem);
            color: #1f130e;
            letter-spacing: 0.08rem;
            box-shadow: 0 4px 0 #7a5d47;
            transition: 0.1s ease;
            cursor: pointer;
            font-family: 'Garamond', serif;
            border: 1px solid #f5dfca;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .question-bar button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #5d4433;
        }

        .question-bar button:disabled {
            opacity: 0.4;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #5d4433;
            pointer-events: none;
        }

        .footer {
            margin-top: 0.3rem;
            color: #7f624b;
            font-size: clamp(0.5rem, 1.2vw, 0.65rem);
            text-align: center;
            letter-spacing: 0.08rem;
        }

        /* Ajustes mobile - CARTA AINDA MAIOR */
        @media (max-width: 480px) {
            .game-container {
                padding: 0.6rem 0.4rem 0.8rem;
                border-radius: 2rem 2rem 1.5rem 1.5rem;
            }
            .card-circle {
                min-height: 220px;
            }
            .center-logo {
                width: 150px;
                height: 150px;
            }
            .question-bar {
                padding: 0.4rem 0.6rem;
                border-radius: 40px;
                gap: 0.3rem;
            }
            .question-bar input {
                min-width: 80px;
                font-size: 0.8rem;
                padding: 0.4rem 0.2rem;
            }
            .question-bar button {
                padding: 0.3rem 0.9rem;
                font-size: 0.7rem;
            }
            .legend-under-card {
                font-size: 0.8rem;
                padding: 0.3rem 0.5rem;
                min-height: 2.2rem;
            }
            .legend-under-card .card-name {
                font-size: 0.95rem;
            }
            .card-revealed {
                width: clamp(160px, 65vw, 250px);
                height: clamp(225px, 91vw, 350px);
            }
            .card-revealed .numero-grande {
                font-size: 1.4rem;
                padding: 0.2rem 1rem;
            }
        }

        @media (max-width: 380px) {
            .card-slot {
                width: 24px;
                height: 36px;
            }
            .card-slot::before {
                font-size: 0.5rem;
            }
            .center-logo {
                width: 120px;
                height: 120px;
            }
            .card-revealed {
                width: clamp(140px, 70vw, 200px);
                height: clamp(196px, 98vw, 280px);
            }
            .card-revealed .numero-grande {
                font-size: 1.1rem;
                padding: 0.1rem 0.8rem;
            }
            .legend-under-card .card-name {
                font-size: 0.85rem;
            }
            .legend-under-card {
                font-size: 0.7rem;
                min-height: 2rem;
            }
        }

        @media (max-width: 320px) {
            .card-revealed {
                width: clamp(120px, 72vw, 170px);
                height: clamp(168px, 100vw, 238px);
            }
        }
    </style>
</head>

            { numero: "8♦", nome: "Oito de Ouros", significado: "Dedicação · habilidade", img: "https://i.ibb.co/1Jmhp9tY/08-oito-de-ouros.jpg" },
            { numero: "9♦", nome: "Nove de Ouros", significado: "Abundância · autonomia", img: "https://i.ibb.co/whVNwnyD/09-nove-de-ouros.jpg" },
            { numero: "10♦", nome: "Dez de Ouros", significado: "Legado · estabilidade", img: "https://i.ibb.co/G42mcJ2S/10-dez-de-ouros.jpg" },
            { numero: "P♦", nome: "Pajem de Ouros", significado: "Aprendizado · prática", img: "https://i.ibb.co/kVmc0qvd/11-valete-de-ouros.jpg" },
            { numero: "C♦", nome: "Cavaleiro de Ouros", significado: "Responsabilidade · método", img: "https://i.ibb.co/tP3C7xfz/12-cavaleiro-de-ouros.jpg" },
            { numero: "R♦", nome: "Rainha de Ouros", significado: "Abundância · praticidade", img: "https://i.ibb.co/KzW0NmhB/13-rainha-de-ouros.jpg" },
            { numero: "K♦", nome: "Rei de Ouros", significado: "Segurança · prosperidade", img: "https://i.ibb.co/wFpM9v84/14-rei-de-ouros.jpg" }
        ];

        // referências
        const circle = document.getElementById('cardCircle');
        const revealedCard = document.getElementById('cardRevealed');
        const revealedImage = document.getElementById('revealedImage');
        const revealedNumber = document.getElementById('revealedNumber');
        const legendUnderCard = document.getElementById('legendUnderCard');
        const drawBtn = document.getElementById('drawButton');
        const questionInput = document.getElementById('questionInput');
        const logoImg = document.getElementById('logoImg');

        logoImg.src = logoUrl;

        let slots = [];
        let animationRunning = false;
        let timeoutId = null;
        let currentCardName = '';

        // Função para posicionar as cartas dinamicamente
        function buildCircle() {
            const total = tarotCards.length;
            const containerWidth = circle.clientWidth;
            const containerHeight = circle.clientHeight;
            const size = Math.min(containerWidth, containerHeight);
            const radius = size * 0.42;
            const centerX = containerWidth / 2;
            const centerY = containerHeight / 2;

            const existingSlots = circle.querySelectorAll('.card-slot');
            existingSlots.forEach(el => el.remove());
            slots = [];

            for (let i = 0; i < total; i++) {
                const angle = (i / total) * 2 * Math.PI - Math.PI/2;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);

                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.dataset.index = i;
                slot.style.left = x + 'px';
                slot.style.top = y + 'px';
                slot.style.transform = 'translate(-50%, -50%)';

                circle.insertBefore(slot, circle.lastElementChild);
                slots.push(slot);
            }
        }

        buildCircle();

        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (!animationRunning) {
                    buildCircle();
                }
            }, 200);
        });

        // Função para pesquisar no Google
        function searchGoogle(cardName) {
            if (!cardName) return;
            // Remove caracteres especiais e formata para a pesquisa
            const searchQuery = `${cardName} Tarot Conselho`;
            const encodedQuery = encodeURIComponent(searchQuery);
            const googleUrl = `https://www.google.com/search?q=${encodedQuery}`;
            window.open(googleUrl, '_blank');
        }

        function startRoulette(callback) {
            if (animationRunning) return;
            animationRunning = true;
            drawBtn.disabled = true;
            questionInput.disabled = true;

            revealedCard.classList.remove('show');
            legendUnderCard.innerHTML = '🌀 <span class="highlight">As cartas estão girando...</span>';

            slots.forEach(s => s.classList.remove('brilho', 'dim'));

            const targetIndex = Math.floor(Math.random() * tarotCards.length);
            let step = 0;
            const totalSteps = 25 + Math.floor(Math.random() * 20);

            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }

            function stepBrilho() {
                slots.forEach(s => s.classList.remove('brilho'));

                const idx = step % slots.length;
                if (slots[idx]) slots[idx].classList.add('brilho');

                slots.forEach((s, i) => {
                    if (i !== idx) s.classList.add('dim');
                });

                step++;

                if (step < totalSteps) {
                    const delay = 30 + (step / totalSteps) * 100;
                    timeoutId = setTimeout(stepBrilho, delay);
                } else {
                    slots.forEach(s => s.classList.remove('brilho', 'dim'));
                    if (slots[targetIndex]) slots[targetIndex].classList.add('brilho');

                    revealCard(targetIndex);

                    animationRunning = false;
                    drawBtn.disabled = false;
                    questionInput.disabled = false;
                    timeoutId = null;

                    if (callback) callback(targetIndex);
                }
            }

            stepBrilho();
        }

        function revealCard(index) {
            const card = tarotCards[index];
            currentCardName = card.nome;
            revealedImage.src = card.img;
            revealedImage.alt = card.nome;
            revealedNumber.textContent = card.numero;

            revealedCard.classList.add('show');
            
            // Cria o HTML com o nome clicável
            legendUnderCard.innerHTML = `✦ <span class="card-name" data-card="${card.nome}">${card.nome} <span class="tooltip">🔍 Pesquisar no Google</span></span> · <span class="meaning">${card.significado}</span>`;
            
            // Adiciona o evento de clique no nome da carta
            const cardNameElement = legendUnderCard.querySelector('.card-name');
            if (cardNameElement) {
                cardNameElement.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const nome = this.dataset.card || this.textContent.trim();
                    searchGoogle(nome);
                });
            }
        }

        function drawCard() {
            if (animationRunning) return;

            const pergunta = questionInput.value.trim();
            if (pergunta === '') {
                legendUnderCard.innerHTML = '✧ <span class="highlight">Escreva sua pergunta</span> antes de tirar a carta.';
                questionInput.style.borderBottomColor = '#dab38b';
                setTimeout(() => {
                    questionInput.style.borderBottomColor = '#b48b6b';
                }, 1000);
                return;
            }

            legendUnderCard.innerHTML = `⚡ <span class="highlight">Pergunta:</span> “${pergunta}” · O oráculo responde...`;

            startRoulette((index) => {
                const card = tarotCards[index];
                currentCardName = card.nome;
                
                // Recria a legenda com o nome clicável
                legendUnderCard.innerHTML = `✦ <span class="card-name" data-card="${card.nome}">${card.nome} <span class="tooltip">🔍 Pesquisar no Google</span></span> · <span class="meaning">${card.significado}</span> <span style="font-size:0.7rem;opacity:0.7;">(pergunta: "${pergunta}")</span>`;
                
                // Adiciona o evento de clique no nome da carta
                const cardNameElement = legendUnderCard.querySelector('.card-name');
                if (cardNameElement) {
                    cardNameElement.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const nome = this.dataset.card || this.textContent.trim();
                        searchGoogle(nome);
                    });
                }
                
                // Limpa o campo de perguntas
                questionInput.value = '';
                questionInput.focus();
                questionInput.placeholder = '✧  Faça sua próxima pergunta...';
                
                setTimeout(() => {
                    if (!questionInput.value) {
                        questionInput.placeholder = '✧  Faça sua pergunta...';
                    }
                }, 5000);
            });
        }

        drawBtn.addEventListener('click', drawCard);

        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                drawCard();
            }
        });

        questionInput.addEventListener('focus', function() {
            if (this.placeholder === '✧  Faça sua próxima pergunta...') {
                this.placeholder = '✧  Faça sua pergunta...';
            }
        });

        window.addEventListener('beforeunload', function() {
            if (timeoutId) clearTimeout(timeoutId);
        });
    })();
</script>
